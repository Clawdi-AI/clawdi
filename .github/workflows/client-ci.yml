name: Client CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "packages/cli/**"
      - "scripts/filter-deploy-openapi.py"
      - "scripts/openapi-typescript.sh"
      - "scripts/generate-deploy-api.sh"
      - "scripts/check-deploy-generated-api.sh"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/actions/setup-bun-ci/**"
      - ".github/workflows/client-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "packages/cli/**"
      - "scripts/filter-deploy-openapi.py"
      - "scripts/openapi-typescript.sh"
      - "scripts/generate-deploy-api.sh"
      - "scripts/check-deploy-generated-api.sh"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/actions/setup-bun-ci/**"
      - ".github/workflows/client-ci.yml"
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: client-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    outputs:
      web: ${{ steps.filter.outputs.web }}
      cli: ${{ steps.filter.outputs.cli }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
      deploy_contract: ${{ steps.filter.outputs.deploy_contract }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            web:
              - "apps/web/**"
            cli:
              - "packages/cli/**"
            shared:
              - "packages/shared/**"
            infra:
              - "package.json"
              - "bun.lock"
              - "turbo.json"
              - "tsconfig.base.json"
              - "biome.json"
              - ".github/actions/setup-bun-ci/**"
              - ".github/workflows/client-ci.yml"
            deploy_contract:
              - "packages/shared/src/api/deploy.generated.ts"
              - "scripts/filter-deploy-openapi.py"
              - "scripts/openapi-typescript.sh"
              - "scripts/generate-deploy-api.sh"
              - "scripts/check-deploy-generated-api.sh"
              - "apps/web/package.json"
              - ".github/workflows/client-ci.yml"

  # Lint + format check across the whole JS/TS tree in one fast job.
  lint:
    needs: changes
    if: >-
      github.event_name != 'schedule' && (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.cli == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.infra == 'true'
      )
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Biome check
        run: bun run check

  typecheck:
    needs: changes
    if: >-
      github.event_name != 'schedule' && (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.cli == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.infra == 'true'
      )
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: web
            filter: "web"
          - target: cli
            filter: "clawdi"
          - target: shared
            filter: "@clawdi/shared"
    steps:
      - name: Guard — run only if this target changed
        id: guard
        env:
          TARGET: ${{ matrix.target }}
          WEB: ${{ needs.changes.outputs.web }}
          CLI: ${{ needs.changes.outputs.cli }}
          SHARED: ${{ needs.changes.outputs.shared }}
          INFRA: ${{ needs.changes.outputs.infra }}
        run: |
          run=false
          if [ "$INFRA" = "true" ]; then
            run=true
          elif [ "$TARGET" = "web" ] && { [ "$WEB" = "true" ] || [ "$SHARED" = "true" ]; }; then
            run=true
          elif [ "$TARGET" = "cli" ] && { [ "$CLI" = "true" ] || [ "$SHARED" = "true" ]; }; then
            run=true
          elif [ "$TARGET" = "shared" ] && [ "$SHARED" = "true" ]; then
            run=true
          fi

          if [ "$run" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v6
      - if: steps.guard.outputs.run == 'true'
        uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - if: steps.guard.outputs.run == 'true'
        name: Typecheck
        env:
          # Required for web typecheck/build — CI doesn't need real values
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          VITE_CLAWDI_API_URL: http://localhost:8000
        run: bunx turbo typecheck --filter=${{ matrix.filter }}

  cli-test:
    needs: changes
    if: >-
      github.event_name != 'schedule' && (
        needs.changes.outputs.cli == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.infra == 'true'
      )
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Smoke tests exercise the compiled bin wrapper, so build before testing.
      - name: Build CLI
        run: bun run --cwd packages/cli build
      - name: Build standalone CLI binary
        run: bun run --cwd packages/cli build:binary
      - name: Smoke standalone CLI binary
        run: |
          packages/cli/dist-bin/clawdi --version
      - name: Validate CLI publish payload
        run: |
          bun run --cwd packages/cli check:publish-manifest
      - name: Test CLI
        run: bun test --isolate --max-concurrency=1 packages/cli

  build:
    needs: [changes, typecheck]
    if: >-
      github.event_name != 'schedule' && (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.infra == 'true'
      )
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build web
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          VITE_CLAWDI_API_URL: http://localhost:8000
          CLERK_SECRET_KEY: sk_test_dummy
        run: bunx turbo build --filter=web

  deploy-contract-drift:
    needs: changes
    if: >-
      github.event_name != 'schedule' &&
      needs.changes.outputs.deploy_contract == 'true'
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Hosted deploy contract matches live spec
        env:
          DEPLOY_OPENAPI_SOURCE: https://api.clawdi.ai/openapi.json
          DEPLOY_CONTRACT_FETCH_MODE: warn
        run: scripts/check-deploy-generated-api.sh

  deploy-contract-drift-daily:
    if: github.event_name == 'schedule'
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun-ci
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Hosted deploy contract matches live spec (strict)
        env:
          DEPLOY_OPENAPI_SOURCE: https://api.clawdi.ai/openapi.json
          DEPLOY_CONTRACT_FETCH_MODE: strict
        run: scripts/check-deploy-generated-api.sh
