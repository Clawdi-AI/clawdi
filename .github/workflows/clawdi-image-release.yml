name: Clawdi Image Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build. Defaults to the workflow SHA."
        required: false
      deploy:
        description: "Update and deploy the Coolify Applications after publishing."
        required: false
        type: boolean
        default: false
      wait:
        description: "Wait for Coolify deployments to finish when deploy=true."
        required: false
        type: boolean
        default: true
      deploy_scope:
        description: "Coolify Applications to deploy after updating image tags."
        required: false
        type: choice
        options:
          - api-only
          - workers-only
          - all
        default: api-only
      build_web:
        description: "Also publish the web image. Requires matching public web build variables."
        required: false
        type: boolean
        default: false
      web_public_api_url:
        description: "NEXT_PUBLIC_API_URL baked into the web image."
        required: false
        default: "http://localhost:8000"
      web_clerk_publishable_key:
        description: "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY baked into the web image."
        required: false
      web_public_deploy_api_url:
        description: "NEXT_PUBLIC_DEPLOY_API_URL baked into the web image."
        required: false
        default: "http://localhost:50021"

permissions:
  contents: read
  packages: write

concurrency:
  group: clawdi-image-release-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE_NAME: ghcr.io/clawdi-ai/clawdi-backend
  WEB_IMAGE_NAME: ghcr.io/clawdi-ai/clawdi-web

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.rev.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve OCI label metadata
        id: labels
        run: |
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "created=${created}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.rev.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.rev.outputs.sha }}
            org.opencontainers.image.version=${{ steps.rev.outputs.sha }}
            org.opencontainers.image.created=${{ steps.labels.outputs.created }}
            org.opencontainers.image.title=Clawdi Backend
            org.opencontainers.image.description=Open-source Clawdi FastAPI backend image for self-hosted and Coolify deployments.
          provenance: false
          cache-from: type=gha,scope=clawdi-backend-image
          cache-to: type=gha,mode=max,scope=clawdi-backend-image

      - name: Validate web image inputs
        if: inputs.build_web
        env:
          WEB_CLERK_PUBLISHABLE_KEY: ${{ inputs.web_clerk_publishable_key }}
        run: |
          if [ -z "$WEB_CLERK_PUBLISHABLE_KEY" ]; then
            echo "web_clerk_publishable_key is required when build_web=true." >&2
            exit 1
          fi

      - name: Build and push web image
        if: inputs.build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.WEB_IMAGE_NAME }}:${{ steps.rev.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ inputs.web_public_api_url }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ inputs.web_clerk_publishable_key }}
            NEXT_PUBLIC_CLAWDI_HOSTED=
            NEXT_PUBLIC_DEPLOY_API_URL=${{ inputs.web_public_deploy_api_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.rev.outputs.sha }}
            org.opencontainers.image.version=${{ steps.rev.outputs.sha }}
            org.opencontainers.image.created=${{ steps.labels.outputs.created }}
            org.opencontainers.image.title=Clawdi Web
            org.opencontainers.image.description=Open-source Clawdi Next.js dashboard image for self-hosted deployments.
          provenance: false
          cache-from: type=gha,scope=clawdi-web-image
          cache-to: type=gha,mode=max,scope=clawdi-web-image

      - name: Print image summary
        run: |
          echo "### Clawdi Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: \`${{ env.BACKEND_IMAGE_NAME }}:${{ steps.rev.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.build_web }}" = "true" ]; then
            echo "- Web: \`${{ env.WEB_IMAGE_NAME }}:${{ steps.rev.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Web: skipped" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    needs: build
    if: inputs.deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build.outputs.image_tag }}

      - name: Deploy Coolify Applications
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          CLAWDI_BACKEND_RUNTIME_IMAGE: ${{ env.BACKEND_IMAGE_NAME }}
          CLAWDI_BACKEND_RUNTIME_TAG: ${{ needs.build.outputs.image_tag }}
          CLAWDI_DEPLOY_SCOPE: ${{ inputs.deploy_scope }}
          CLAWDI_WAIT_FOR_DEPLOY: ${{ inputs.wait }}
        run: |
          if [ -z "$COOLIFY_API_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "COOLIFY_API_URL and COOLIFY_TOKEN secrets are required when deploy=true." >&2
            exit 1
          fi

          args=()
          if [ "$CLAWDI_WAIT_FOR_DEPLOY" = "true" ]; then
            args+=(--wait)
          fi
          args+=(--deploy-scope "$CLAWDI_DEPLOY_SCOPE")
          python3 infra/deploy/coolify/deploy_ghcr_runtime.py "${args[@]}"
