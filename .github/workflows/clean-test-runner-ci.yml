name: Clean Test Runner CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Clean runner suite to execute"
        required: true
        default: ci
        type: choice
        options:
          - ci
          - all
  pull_request:
    paths:
      - "docker/**"
      - ".dockerignore"
      - "docker-compose.test.yml"
      - "scripts/test.sh"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "apps/web/package.json"
      - "apps/web/bunfig.toml"
      - "apps/web/tsconfig.json"
      - "apps/web/tsr.config.json"
      - "apps/web/vite.config.ts"
      - "apps/web/src/hosted/oss-clean.test.ts"
      - "packages/cli/package.json"
      - "packages/cli/tsconfig.json"
      - "packages/cli/tests/clean-test-runner.test.ts"
      - "packages/cli/tests/smoke.test.ts"
      - "packages/shared/package.json"
      - "packages/shared/tsconfig.json"
      - "packages/whatsapp-baileys-sidecar/package.json"
      - "packages/whatsapp-baileys-sidecar/tsconfig.json"
      - "backend/alembic.ini"
      - "backend/alembic/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "backend/tests/conftest.py"
      - "backend/tests/test_smoke.py"
      - ".github/workflows/clean-test-runner-ci.yml"
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".dockerignore"
      - "docker-compose.test.yml"
      - "scripts/test.sh"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.base.json"
      - "apps/web/package.json"
      - "apps/web/bunfig.toml"
      - "apps/web/tsconfig.json"
      - "apps/web/tsr.config.json"
      - "apps/web/vite.config.ts"
      - "apps/web/src/hosted/oss-clean.test.ts"
      - "packages/cli/package.json"
      - "packages/cli/tsconfig.json"
      - "packages/cli/tests/clean-test-runner.test.ts"
      - "packages/cli/tests/smoke.test.ts"
      - "packages/shared/package.json"
      - "packages/shared/tsconfig.json"
      - "packages/whatsapp-baileys-sidecar/package.json"
      - "packages/whatsapp-baileys-sidecar/tsconfig.json"
      - "backend/alembic.ini"
      - "backend/alembic/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "backend/tests/conftest.py"
      - "backend/tests/test_smoke.py"
      - ".github/workflows/clean-test-runner-ci.yml"

permissions:
  contents: read

concurrency:
  group: clean-test-runner-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-runner:
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 30
    env:
      CLAWDI_TEST_COMPOSE_PROJECT_NAME: clawdi-test-ci-${{ github.run_id }}
      TEST_RUNNER_IMAGE: clawdi-test-runner:ci
      CLAWDI_TEST_RUNNER_SKIP_BUILD: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Check Docker availability
        run: |
          docker version
          docker compose version
      - name: Validate Compose config
        run: docker compose -f docker-compose.test.yml config >/dev/null
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build cached test runner image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/test-runner.Dockerfile
          load: true
          tags: ${{ env.TEST_RUNNER_IMAGE }}
          cache-from: type=gha,scope=clawdi-test-runner
          cache-to: type=gha,mode=max,scope=clawdi-test-runner
      - name: Clean runner CI profile
        if: github.event_name != 'workflow_dispatch' || inputs.suite == 'ci'
        run: scripts/test.sh ci
      - name: Full clean runner suite
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'all'
        run: scripts/test.sh all
