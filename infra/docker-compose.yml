services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: clawdi_cloud
      POSTGRES_USER: clawdi
      POSTGRES_PASSWORD: clawdi_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
