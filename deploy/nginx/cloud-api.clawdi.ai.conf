# nginx vhost for clawdi-cloud backend.
#
# Install:
#   sudo cp deploy/nginx/cloud-api.clawdi.ai.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/cloud-api.clawdi.ai.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS is handled by certbot; re-run after the DNS record resolves:
#   sudo certbot --nginx -d cloud-api.clawdi.ai
# Certbot edits this file in place to add the listen 443 + cert lines and
# the :80 → :443 redirect. Keep both halves of the file after it does that.

upstream clawdi_cloud_backend {
    server 127.0.0.1:8070;
    server 127.0.0.1:8071;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name cloud-api.clawdi.ai;

    # Let certbot issue the first cert via HTTP-01; afterwards this block is
    # rewritten to redirect to :443.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud-api.clawdi.ai;

    access_log /var/log/nginx/clawdi-cloud-backend-access.log;
    error_log /var/log/nginx/clawdi-cloud-backend-error.log;

    # Upload cap for `POST /api/sessions/{id}/upload` — JSONL transcripts can
    # get large. 50MB is generous; bump if a real user hits the limit.
    client_max_body_size 50m;

    location / {
        proxy_pass http://clawdi_cloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly — don't buffer responses. This backend doesn't
        # stream today but the knob is cheap and future-proofs MCP proxying.
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # Generous timeouts — fastembed warmup on a cold backend can take
        # ~60s before the first /health returns green.
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ssl_certificate and ssl_certificate_key will be filled in by certbot
    # when you run `sudo certbot --nginx -d cloud-api.clawdi.ai`.
    # Do NOT commit real certificate paths here — certbot manages them.
}
